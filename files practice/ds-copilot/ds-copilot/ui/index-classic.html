<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ds-copilot — Enterprise Agentic Copilot</title>
<style>
:root{--ink:#1c1917;--ink2:#44403c;--mut:#78716c;--line:#e7e5e4;--bg:#faf9f7;--acc:#b3282d;--acc2:#8a1f23;--vio:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-sans-serif,system-ui,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(120deg,#1c1917,#3b1d1e);color:#fafaf9;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
header b{font-size:16px}
header .sub{font-size:11px;color:#d6d3d1}
.role{display:flex;gap:6px;align-items:center;font-size:12px}
.role button{border:1px solid #78716c;background:transparent;color:#e7e5e4;border-radius:8px;padding:5px 12px;cursor:pointer;font-weight:700}
.role button.on{background:var(--acc);border-color:var(--acc)}
main{flex:1;overflow-y:auto;padding:18px;max-width:960px;width:100%;margin:0 auto}
.msg{margin:10px 0;display:flex}
.msg.user{justify-content:flex-end}
.bubble{max-width:78%;border-radius:14px;padding:10px 14px;line-height:1.5}
.user .bubble{background:var(--ink);color:#fafaf9;border-bottom-right-radius:4px}
.bot .bubble{background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
.bot .bubble.refused{background:#fff1f2;border-color:#fecdd3}
.cites{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
.cite{font-size:10.5px;font-weight:700;background:#ede9fe;color:var(--vio);border:1px solid #c4b5fd;border-radius:999px;padding:1px 9px}
.trace{margin-top:8px;font-size:11px;color:var(--mut);border-top:1px dashed var(--line);padding-top:6px;display:none;white-space:pre-wrap;word-break:break-all}
.bubble.open .trace{display:block}
.tbtn{font-size:10px;color:var(--acc2);cursor:pointer;margin-top:6px;font-weight:700}
.bubble img{max-width:100%;border:1px solid var(--line);border-radius:8px;margin-top:8px}
footer{border-top:1px solid var(--line);background:#fff;padding:12px 18px}
.inrow{max-width:960px;margin:0 auto;display:flex;gap:8px}
#q{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-family:inherit;font-size:14px}
#send{background:var(--acc);color:#fff;border:0;border-radius:10px;padding:10px 20px;font-weight:800;cursor:pointer}
.chips{max-width:960px;margin:8px auto 0;display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11px;border:1px solid var(--line);background:var(--bg);border-radius:999px;padding:3px 10px;cursor:pointer;color:var(--ink2)}
.roleband{font-size:10px;font-weight:800;letter-spacing:.06em;color:var(--vio)}
</style>
</head>
<body>
<header>
  <div><b>ds-copilot</b> · grounded, cited, role-scoped<div class="sub">rules mode (offline) · semantic-layer SQL · every answer traceable · synthetic corpus</div></div>
  <div style="display:flex;align-items:center;gap:12px"><span id="llmPill" style="font-size:10.5px;color:#d6d3d1">·</span>
  <div class="role">Role: <button id="rOps" class="on">Operations</button><button id="rExec">Executive</button></div></div>
</header>
<main id="chat"></main>
<footer>
  <div class="inrow"><input id="q" placeholder="Ask about policies, schemes, volumes… (Enter to send)"><button id="send">Ask</button></div>
  <div class="chips" id="chips"></div>
</footer>
<script>
let ROLE = "ops";
const $ = id => document.getElementById(id);
const SUGGEST = [
 "How many Earned Leave days do employees get per year now?",
 "Why did North-zone Rajnigandha volumes drop in early 2025?",
 "What is the distributor margin on Confectionery?",
 "What's the deadline to file an expense claim?",
 "monthly Pulse volume in Northeast 2025",
];
function chip(t){ const c=document.createElement("span"); c.className="chip"; c.textContent=t;
  c.onclick=()=>{ $("q").value=t; send(); }; return c; }
SUGGEST.forEach(s=>$("chips").appendChild(chip(s)));
function add(role, html, cls){
  const m=document.createElement("div"); m.className="msg "+role;
  const b=document.createElement("div"); b.className="bubble "+(cls||"");
  b.innerHTML=html; m.appendChild(b); $("chat").appendChild(m);
  $("chat").scrollTop=$("chat").scrollHeight; return b;
}
async function send(){
  const q=$("q").value.trim(); if(!q) return;
  $("q").value="";
  add("user", `<span class="roleband">${ROLE==="ops"?"OPERATIONS":"EXECUTIVE"}</span><br>`+esc(q));
  const b=add("bot","<i>thinking…</i>");
  try{
    const r=await (await fetch("/ask?role="+ROLE,{method:"POST",body:JSON.stringify({question:q})})).json();
    let h=esc(r.answer);
    if(r.citations&&r.citations.length)
      h+=`<div class="cites">${r.citations.map(c=>`<span class="cite">${esc(c)}</span>`).join("")}</div>`;
    if(r.ai && r.ai.used) h+=`<div style="margin-top:6px;font-size:10.5px;color:#7c3aed;font-weight:700">\u2728 AI-polished${r.ai.usd!=null?` \u00b7 $${(+r.ai.usd).toFixed(5)}`:""}${r.ai.cached?" \u00b7 cached":""} \u00b7 citations preserved</div>`;
    if(r.chart) h+=`<img src="/${r.chart}" alt="chart">`;
    h+=`<div class="tbtn" onclick="this.parentElement.classList.toggle('open')">⛓ tool trace</div>
        <div class="trace">${esc(JSON.stringify(r.trace,null,1))}</div>`;
    b.innerHTML=h; b.className="bubble"+(r.refused?" refused":"");
  }catch(e){ b.innerHTML="server error: "+esc(String(e)); }
}
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/\n/g,"<br>");
$("send").onclick=send;
$("q").addEventListener("keydown",e=>{if(e.key==="Enter")send();});
$("rOps").onclick=()=>{ROLE="ops";$("rOps").classList.add("on");$("rExec").classList.remove("on");};
$("rExec").onclick=()=>{ROLE="exec";$("rExec").classList.add("on");$("rOps").classList.remove("on");};
</script>
</body>
</html>
