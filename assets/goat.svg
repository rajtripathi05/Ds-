<!-- viewBox extends to y=-75 for headroom: at the top of the climb the goat's horn
     reaches y=-56, which would otherwise be clipped off the canvas. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -75 820 330" width="820" height="330"
     role="img" aria-label="An animated goat climbing a rising growth chart">
  <title>The GOAT climbing the curve</title>

  <style>
    /* Palette works on both GitHub light and dark themes:
       cream fill + dark outline reads on either; grid is neutral alpha. */
    .grid   { stroke: #8a8a8a; stroke-opacity: .22; stroke-width: 1; }
    .noise  { fill: none; stroke: #8a8a8a; stroke-opacity: .35; stroke-width: 2;
              stroke-linejoin: round; stroke-linecap: round; }
    .trend  { fill: none; stroke: #b3282d; stroke-width: 4;
              stroke-linecap: round; stroke-linejoin: round;
              stroke-dasharray: 660; stroke-dashoffset: 660;
              animation: draw 8s ease-in-out infinite; }
    .dot    { fill: #b3282d; opacity: 0; animation: pop 8s ease-in-out infinite; }
    .cap    { fill: #8a8a8a; font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace;
              letter-spacing: .08em; }

    /* --- the climb: goat tracks the straight trend line (60,190) to (660,58).
       NOTE: a CSS transform REPLACES the element's transform presentation
       attribute, so the base offset is baked into every keyframe below rather
       than left on the group. (Also: no angle brackets in this comment — SVG is
       XML, and a bare "less-than" inside style content breaks the parse.) --- */
    .goat   { animation: climb 8s ease-in-out infinite; }
    @keyframes climb {
      0%   { transform: translate(28px, 190px);  opacity: 0; }
      4%   { transform: translate(28px, 190px);  opacity: 1; }
      55%  { transform: translate(628px, 58px);  opacity: 1; }
      90%  { transform: translate(628px, 58px);  opacity: 1; }
      100% { transform: translate(628px, 58px);  opacity: 0; }
    }
    @keyframes draw {
      0%   { stroke-dashoffset: 660; opacity: 0; }
      4%   { opacity: 1; }
      55%  { stroke-dashoffset: 0;   opacity: 1; }
      90%  { stroke-dashoffset: 0;   opacity: 1; }
      100% { stroke-dashoffset: 0;   opacity: 0; }
    }
    @keyframes pop {
      0%, 8%   { opacity: 0; transform: scale(.2); }
      55%, 90% { opacity: 1; transform: scale(1); }
      100%     { opacity: 0; transform: scale(1); }
    }
    .d1 { animation-delay: 0s;    transform-origin: 188px 148px; }
    .d2 { animation-delay: 0s;    transform-origin: 316px 118px; }
    .d3 { animation-delay: 0s;    transform-origin: 444px  90px; }
    .d4 { animation-delay: 0s;    transform-origin: 572px  62px; }

    /* --- body mechanics --- */
    .bob    { animation: bob .62s ease-in-out infinite; }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2.5px); } }

    .leg    { transform-box: fill-box; transform-origin: 50% 0%;
              animation: step .62s ease-in-out infinite; }
    .leg.b  { animation-delay: -.31s; }
    @keyframes step { 0%,100% { transform: rotate(17deg); } 50% { transform: rotate(-17deg); } }

    .tail   { transform-box: fill-box; transform-origin: 100% 100%;
              animation: wag .38s ease-in-out infinite; }
    @keyframes wag { 0%,100% { transform: rotate(-14deg); } 50% { transform: rotate(16deg); } }

    .beard  { transform-box: fill-box; transform-origin: 50% 0%;
              animation: chew .9s ease-in-out infinite; }
    @keyframes chew { 0%,100% { transform: rotate(-7deg); } 50% { transform: rotate(7deg); } }

    .eye    { transform-box: fill-box; transform-origin: 50% 50%;
              animation: blink 3.4s infinite; }
    @keyframes blink { 0%,94%,100% { transform: scaleY(1); } 97% { transform: scaleY(.1); } }

    @media (prefers-reduced-motion: reduce) {
      .goat, .trend, .dot, .bob, .leg, .tail, .beard, .eye { animation: none; }
      .trend { stroke-dashoffset: 0; }
      .goat  { transform: translate(628px, 58px); }
      .dot   { opacity: 1; }
    }
  </style>

  <!-- grid -->
  <g class="grid">
    <line x1="60" y1="210" x2="760" y2="210"/>
    <line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="110" x2="760" y2="110"/>
    <line x1="60" y1="60"  x2="760" y2="60"/>
    <line x1="60" y1="30"  x2="60"  y2="210"/>
  </g>

  <!-- the messy actual series, behind the trend -->
  <path class="noise" d="M60,196 L124,182 L188,190 L252,160 L316,168 L380,132
                          L444,142 L508,104 L572,112 L636,74 L700,66"/>

  <!-- the trend the goat walks: straight from (60,190) to (660,58) -->
  <path class="trend" d="M60,190 L660,58"/>
  <circle class="dot d1" cx="188" cy="148" r="4.5"/>
  <circle class="dot d2" cx="316" cy="118" r="4.5"/>
  <circle class="dot d3" cx="444" cy="90"  r="4.5"/>
  <circle class="dot d4" cx="572" cy="62"  r="4.5"/>

  <text class="cap" x="60" y="236">FORECAST · GOVERN · DECIDE</text>

  <!-- ================= GOAT ================= -->
  <!-- local origin = hooves on the line at (60,190); climb() translates this group -->
  <g class="goat" transform="translate(28,190)">
    <g class="bob">
      <!-- far legs (behind body) — each leg+hoof rotates as one unit about the hip -->
      <g stroke="#2f2a26" stroke-width="2.4" stroke-linejoin="round">
        <g class="leg b">
          <rect x="14" y="-34" width="7" height="34" rx="3.5" fill="#e2d7c4"/>
          <rect x="14" y="-7"  width="7" height="7"  rx="2"   fill="#2f2a26"/>
        </g>
        <g class="leg">
          <rect x="52" y="-34" width="7" height="34" rx="3.5" fill="#e2d7c4"/>
          <rect x="52" y="-7"  width="7" height="7"  rx="2"   fill="#2f2a26"/>
        </g>
      </g>

      <!-- tail -->
      <path class="tail" d="M2,-58 L-11,-66 L-6,-50 Z"
            fill="#f7f2e9" stroke="#2f2a26" stroke-width="2.4" stroke-linejoin="round"/>

      <!-- body -->
      <rect x="0" y="-64" width="76" height="34" rx="16"
            fill="#f7f2e9" stroke="#2f2a26" stroke-width="2.6"/>

      <!-- near legs (in front of body) -->
      <g stroke="#2f2a26" stroke-width="2.4" stroke-linejoin="round">
        <g class="leg">
          <rect x="5" y="-34" width="7.5" height="34" rx="3.75" fill="#f7f2e9"/>
          <rect x="5" y="-7"  width="7.5" height="7"  rx="2"    fill="#2f2a26"/>
        </g>
        <g class="leg b">
          <rect x="61" y="-34" width="7.5" height="34" rx="3.75" fill="#f7f2e9"/>
          <rect x="61" y="-7"  width="7.5" height="7"  rx="2"    fill="#2f2a26"/>
        </g>
      </g>

      <!-- neck -->
      <path d="M62,-56 L80,-80 L94,-72 L74,-46 Z"
            fill="#f7f2e9" stroke="#2f2a26" stroke-width="2.6" stroke-linejoin="round"/>

      <!-- head + muzzle -->
      <path d="M76,-86 Q86,-96 100,-92 L114,-86 Q120,-83 116,-78 L98,-70
               Q84,-68 78,-76 Z"
            fill="#f7f2e9" stroke="#2f2a26" stroke-width="2.6" stroke-linejoin="round"/>

      <!-- horn, swept back -->
      <path d="M84,-92 Q84,-108 68,-114"
            fill="none" stroke="#8a7355" stroke-width="6" stroke-linecap="round"/>
      <path d="M84,-92 Q84,-108 68,-114"
            fill="none" stroke="#2f2a26" stroke-width="1.2" stroke-linecap="round" opacity=".5"/>

      <!-- ear -->
      <ellipse cx="79" cy="-83" rx="7.5" ry="4" transform="rotate(-24 79 -83)"
               fill="#e2d7c4" stroke="#2f2a26" stroke-width="2"/>

      <!-- eye -->
      <circle class="eye" cx="100" cy="-84" r="2.6" fill="#2f2a26"/>

      <!-- beard -->
      <path class="beard" d="M96,-71 L99,-56 L105,-70 Z"
            fill="#f7f2e9" stroke="#2f2a26" stroke-width="2.2" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
