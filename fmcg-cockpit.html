<script>
// ===================== STATE =====================
const DEFAULT=window.__MASTER__||{categories:[],months:[],params:{},promos:[],zones:[]};
let MASTER=clone(DEFAULT), role='ops', tab='overview';
let intents=[], redoStack=[], demandOverride={}, priority=50, promoOn={}, scenarios=[], mcCache=null, SRC='synthetic default';
const ZONES=DEFAULT.zones||["North","South","East","West","Central"];
const TABS=[["overview","Overview"],["network","Network map"],["demand","Demand & Forecast"],["sop","S&OP"],["capacity","Capacity"],["risk","Risk (Monte-Carlo)"],["promo","Promotions"],["finance","Finance"],["warroom","War Room"],["scenarios","Scenarios"],["copilot","Copilot"],["validation","Validation"]];
function clone(o){return JSON.parse(JSON.stringify(o));}
const money=()=>role==='exec';
const INR=n=>'₹'+Math.round(n).toLocaleString('en-IN');
const INRcr=n=>'₹'+(n/1e7).toFixed(2)+' cr';
const INRL=n=>Math.abs(n)>=1e7?INRcr(n):'₹'+(n/1e5).toFixed(1)+' L';
function sum(a){return a.reduce((x,y)=>x+(+y||0),0);}
function fmt(n){n=+n||0;var a=Math.abs(n);if(a>=1e7)return (n/1e7).toFixed(2)+' Cr';if(a>=1e5)return (n/1e5).toFixed(2)+' L';return Math.round(n).toLocaleString('en-IN');}
function pctFill(f){return (f*100).toFixed(1)+'%';}

// ===================== ENGINE (deterministic, never throws) =====================
function effectiveDemand(c,M){
  let demand=(c.demand||[]).map(x=>+x||0);
  if(!demand.length){demand=[1000,1000,1000,1000,1000,1000];}
  const ov=demandOverride[c.name]||{};
  demand=demand.map((d,i)=> ov[i]!=null? +ov[i]: d);
  let dm=1,extra=0;
  intents.forEach(it=>{ if(it.cat===c.name||it.cat==='ALL'){ if(it.t==='demand') dm*=(1+it.pct/100); if(it.t==='order') extra+=it.qty; }});
  // active promos add elasticity-driven lift to month 0..1
  (M.promos||[]).forEach(p=>{ if(promoOn[p.promo_id] && p.category===c.name){ const lift=(c.elasticity||1)*(p.depth||10)/100; dm*=(1+lift); }});
  return demand.map((d,i)=>Math.max(0,Math.round(d*dm)+(i<=1?Math.round(extra/2):0)));
}
function solve(M){
  const warnings=[]; let cats=[];
  const target=(M.params&&M.params.otif_target)||95;
  try{
    cats=(M.categories||[]).map(c=>{
      let demand=effectiveDemand(c,M);
      let cm=1; intents.forEach(it=>{ if((it.cat===c.name||it.cat==='ALL')&&it.t==='capacity') cm*=(1+it.pct/100); });
      let cap=Math.round((+c.capacity_per_month||0)*cm);
      if(cap<=0){cap=Math.round(Math.max(...demand)*1.1);warnings.push([c.name,"no capacity → 110% of peak demand"]);}
      const price=+c.price||10, cost=+c.unit_cost||price*0.6, el=+c.elasticity||1;
      // priority raises effective safety stock (protect service)
      let inv=Math.max(0,(+c.inventory_cases||0))*(1+priority/100*0.25);
      const shares=c.zone_share||{}; const zserved={},zdem={};
      const rows=demand.map((d,i)=>{
        const production=Math.min(cap,Math.max(0,d-inv));
        const supply=inv+production, served=Math.min(d,supply), short=Math.max(0,d-served);
        const util=cap?production/cap:0; inv=Math.max(0,supply-served);
        const fill=d?served/d:1;
        ZONES.forEach(z=>{const s=(shares[z]||1/ZONES.length); zdem[z]=(zdem[z]||0)+d*s; zserved[z]=(zserved[z]||0)+served*s;});
        return {m:(M.months&&M.months[i])||('M'+(i+1)),demand:d,production,served,short,util,invEnd:inv,cap,fill};
      });
      const totD=sum(rows.map(r=>r.demand)),totS=sum(rows.map(r=>r.served)),totShort=sum(rows.map(r=>r.short));
      const fill=totD?totS/totD:1, avgUtil=rows.reduce((a,r)=>a+r.util,0)/rows.length;
      return {name:c.name,price,cost,el,rows,cap,fill,avgUtil,totD,totS,totShort,zserved,zdem,
        revenue:totS*price,margin:totS*(price-cost),revAtRisk:totShort*price,
        invWeeks:c.inventory_cases&&rows[0]?(c.inventory_cases/(rows[0].demand||1)*4.3):0};
    });
  }catch(e){warnings.push(["engine","unexpected: "+e.message]);}
  const totRev=sum(cats.map(c=>c.revenue)),totMar=sum(cats.map(c=>c.margin)),totRisk=sum(cats.map(c=>c.revAtRisk));
  const otif=cats.length? sum(cats.map(c=>c.totS))/Math.max(1,sum(cats.map(c=>c.totD))):1;
  const binding=cats.slice().sort((a,b)=>(b.totShort-a.totShort)||(b.avgUtil-a.avgUtil))[0];
  // zones rollup
  const zones=ZONES.map(z=>{const dem=sum(cats.map(c=>c.zdem[z]||0)),srv=sum(cats.map(c=>c.zserved[z]||0));return {name:z,demand:dem,served:srv,fill:dem?srv/dem:1};});
  const alerts=[];
  cats.forEach(c=>{
    if(c.totShort>0)alerts.push(["r","p1","⛔",`${c.name}: shortfall ${fmt(c.totShort)} cases — demand > capacity+stock`,"capacity"]);
    else if(c.fill*100<target)alerts.push(["a","p2","🟠",`${c.name}: fill ${(c.fill*100).toFixed(0)}% below ${target}% target`,"sop"]);
    if(c.avgUtil>0.95)alerts.push(["a","p2","⚙️",`${c.name}: capacity hot at ${(c.avgUtil*100).toFixed(0)}%`,"capacity"]);
  });
  zones.forEach(z=>{if(z.fill*100<target-3)alerts.push(["a","p2","🗺",`${z.name} zone fill ${(z.fill*100).toFixed(0)}% — below target`,"network"]);});
  if(!alerts.length)alerts.push(["g","","✅","All categories and zones meet the OTIF target within capacity.","overview"]);
  return {cats,zones,totRev,totMar,totRisk,otif,binding,target,alerts,warnings};
}
let STATE=solve(MASTER);
function resolve(){mcCache=null;STATE=solve(MASTER);render();updateNav();}

// ===================== MONTE-CARLO =====================
let _seed=12345; function rnd(){_seed=(_seed*1103515245+12345)&0x7fffffff;return _seed/0x7fffffff;}
function gauss(){return Math.sqrt(-2*Math.log(rnd()+1e-9))*Math.cos(6.2831853*rnd());}
function montecarlo(M,N){
  if(mcCache&&mcCache.N===N)return mcCache; _seed=12345;
  const target=(M.params&&M.params.otif_target)||95, otifs=[],risks=[]; const catFill={};
  (M.categories||[]).forEach(c=>catFill[c.name]=[]);
  for(let k=0;k<N;k++){
    let tot=0,srv=0,risk=0;
    (M.categories||[]).forEach(c=>{
      const base=effectiveDemand(c,M); const sig=+c.sigma||0.2;
      let cm=1;intents.forEach(it=>{if((it.cat===c.name||it.cat==='ALL')&&it.t==='capacity')cm*=(1+it.pct/100);});
      const cap=Math.max(1,Math.round((+c.capacity_per_month||1)*cm));
      let inv=Math.max(0,(+c.inventory_cases||0))*(1+priority/100*0.25);
      let cd=0,cs=0;
      base.forEach(d0=>{const d=Math.max(0,Math.round(d0*(1+gauss()*sig)));const prod=Math.min(cap,Math.max(0,d-inv));const sup=inv+prod;const s=Math.min(d,sup);inv=Math.max(0,sup-s);cd+=d;cs+=s;risk+=Math.max(0,d-s)*(+c.price||10);});
      catFill[c.name].push(cd?cs/cd:1); tot+=cd;srv+=cs;
    });
    otifs.push(tot?srv/tot:1); risks.push(risk);
  }
  otifs.sort((a,b)=>a-b);risks.sort((a,b)=>a-b);
  const q=(arr,p)=>arr[Math.min(arr.length-1,Math.floor(p*arr.length))];
  const pMeet=otifs.filter(o=>o*100>=target).length/N;
  const catP10={};for(const n in catFill){catFill[n].sort((a,b)=>a-b);catP10[n]=q(catFill[n],0.1);}
  mcCache={N,p10:q(otifs,0.1),p50:q(otifs,0.5),p90:q(otifs,0.9),pMeet,riskP50:q(risks,0.5),riskP90:q(risks,0.9),otifs,catP10,target};
  return mcCache;
}

// ===================== FORECAST (linear trend + P80 band) =====================
function forecastCat(demand,h){
  const n=demand.length,xs=demand.map((_,i)=>i), mx=(n-1)/2,my=sum(demand)/n;
  let num=0,den=0;for(let i=0;i<n;i++){num+=(xs[i]-mx)*(demand[i]-my);den+=(xs[i]-mx)**2;}
  const slope=den?num/den:0, inter=my-slope*mx;
  const resid=demand.map((d,i)=>d-(inter+slope*i)), rs=Math.sqrt(sum(resid.map(r=>r*r))/Math.max(1,n-2));
  const fc=[];for(let i=0;i<h;i++){const yhat=Math.max(0,inter+slope*(n+i));fc.push({p50:Math.round(yhat),lo:Math.round(Math.max(0,yhat-1.28*rs)),hi:Math.round(yhat+1.28*rs)});}
  return {slope,fc};
}

// ===================== OPTIMIZER =====================
function optimize(M,obj){
  const budget=Math.round(sum((M.categories||[]).map(c=>+c.capacity_per_month||0))*((M.capex_budget_pct||15)/100));
  const alloc={}; (M.categories||[]).forEach(c=>alloc[c.name]=0);
  const chunk=Math.max(1,Math.round(budget/20)); let spent=0;
  function scoreWith(extra){ const M2=clone(M); M2.categories.forEach(c=>{c.capacity_per_month=(+c.capacity_per_month||0)+(extra[c.name]||0);}); const S=solveWith(M2); return obj==='margin'?S.totMar:(obj==='risk'?-S.totRisk:S.otif); }
  while(spent<budget){
    let best=null,bestGain=-1e18; const cur=scoreWith(alloc);
    (M.categories||[]).forEach(c=>{const t={...alloc};t[c.name]+=chunk;const g=scoreWith(t)-cur;if(g>bestGain){bestGain=g;best=c.name;}});
    if(!best||bestGain<=0)break; alloc[best]+=chunk; spent+=chunk;
  }
  return {alloc,budget,spent};
}
function solveWith(M){const oldO=demandOverride,oldI=intents;const S=solve(M);return S;} // solve reads globals; M carries capacity

// ===================== AGENTS (war room) =====================
function agents(){
  const S=solve(MASTER), out=[], acts=[];
  const short=S.cats.filter(c=>c.totShort>0);
  // Demand Planner
  const vol=[...S.cats].sort((a,b)=>b.totD-a.totD)[0];
  out.push(["📊","Demand Planner",`${vol.name} carries the largest volume. ${short.length?short.map(c=>c.name).join(' & ')+' show demand above supply.':'Demand sits within supply everywhere.'}`, short.length?`Trim ${short[0].name} plan 10% or move volume earlier.`:null, short.length?{t:'demand',cat:short[0].name,pct:-10}:null]);
  // Supply Planner
  out.push(["🏭","Supply Planner",`Binding constraint is ${S.binding?S.binding.name:'—'} at ${(S.binding?S.binding.avgUtil*100:0).toFixed(0)}% utilisation.`, S.binding&&S.binding.totShort>0?`Add ~20% capacity to ${S.binding.name}.`:'Capacity is adequate; hold.', S.binding&&S.binding.totShort>0?{t:'capacity',cat:S.binding.name,pct:20}:null]);
  // Finance Controller
  out.push(["💰","Finance Controller",money()?`Plan revenue ${INRcr(S.totRev)}, margin ${INRcr(S.totMar)}; revenue-at-risk ${INRcr(S.totRisk)}.`:`Financials are Executive-scoped (hidden in this role).`, S.totRisk>0?`Protect the ₹ at risk — fund the binding constraint before discounting.`:'No revenue at risk.', null]);
  // Sales Head
  const worstZone=[...S.zones].sort((a,b)=>a.fill-b.fill)[0];
  out.push(["🤝","Sales Head",`Weakest zone is ${worstZone.name} at ${(worstZone.fill*100).toFixed(0)}% fill.`, worstZone.fill*100<S.target?`Raise delivery-priority to protect ${worstZone.name}, or pre-position stock.`:'Service is balanced across zones.', null]);
  // Sustainability
  const co2=sum(S.cats.map(c=>c.totS))*0.0009;
  out.push(["🌱","Sustainability",`Plan implies ~${co2.toFixed(0)} t CO₂e; short-shipping wastes production already made.`, short.length?`Avoid over-producing ${short.length?'':''}slow movers; match make to demand.`:'Make-to-demand is well matched.', null]);
  out.forEach(a=>{if(a[4])acts.push(a[4]);});
  // convergence
  let rec=`No change needed — the plan already meets the ${S.target}% OTIF target.`;
  if(acts.length){const capAct=acts.find(a=>a.t==='capacity'); rec = capAct? `Consensus: fund the binding constraint — <b>+${capAct.pct}% capacity to ${capAct.cat}</b> lifts service fastest. Demand-trim is the fallback if capex is frozen.` : `Consensus: rebalance demand — <b>${acts[0].pct}% on ${acts[0].cat}</b>.`;}
  return {out,acts,rec};
}

      let net=0,supplyOk='—';
      if(c){const baseServed=c.rows[0].served;const extraDem=baseServed*lift/100;const price2=c.price*(1-p.depth/100);const incMargin=extraDem*(price2-c.cost);const spend=baseServed*(p.depth/100)*c.price*0.15;net=incMargin-spend;supplyOk=c.totShort>0?'⚠ tight':'✓';}
      return `<tr><td><input type="checkbox" ${on?'checked':''} onchange="togglePromo('${p.promo_id}')"></td><td class="cat" style="font-variant-numeric:tabular-nums">${p.promo_id}</td><td>${p.category}</td><td>${p.depth}%</td><td>${el.toFixed(2)}</td><td>+${lift.toFixed(0)}%</td><td>${m?(net>=0?'<b style=color:var(--ok)>'+INR(net)+'</b>':'<b style=color:var(--rej)>'+INR(net)+'</b>'):'<span class="lock">🔒</span>'}</td><td>${supplyOk}</td></tr>`;}).join('')}
    </tbody></table><div style="font-size:12px;color:var(--mut);margin-top:10px">Active promos feed the whole plan — check the S&OP and Risk tabs to see the capacity impact. ${m?'':'Rupee columns are Executive-only.'}</div></div>`;
}
function renderFinance(S,m){
  document.getElementById('p-finance').innerHTML=`
    <h2 class="serif">Financial twin ${m?'':'<span class="lock">🔒 Executive only</span>'}</h2><div class="sub">${m?'Revenue, margin, EBITDA proxy and revenue-at-risk — recomputed with every change.':'Sign in as Executive (top-right) to view. Operations sees none of this — not shown, not computed into anything visible.'}</div>
    ${m?`<div class="kpis">
      <div class="kpi ok"><div class="l">Plan revenue</div><div class="n">${INRcr(S.totRev)}</div><div class="s">served demand × price</div></div>
      <div class="kpi"><div class="l">Gross margin</div><div class="n">${INRcr(S.totMar)}</div><div class="s">${(S.totMar/S.totRev*100).toFixed(0)}% of revenue</div></div>
      <div class="kpi vio"><div class="l">EBITDA proxy</div><div class="n">${INRcr(S.totMar*0.55)}</div><div class="s">after ~45% opex</div></div>
      <div class="kpi rej"><div class="l">Revenue at risk</div><div class="n">${INRcr(S.totRisk)}</div><div class="s">unmet demand</div></div></div>
    <div class="card"><h3>By category</h3><table><thead><tr><th>Category</th><th>Revenue</th><th>Margin</th><th>Margin %</th><th>At risk</th></tr></thead><tbody>
    ${S.cats.map(c=>`<tr><td class="cat">${c.name}</td><td>${INR(c.revenue)}</td><td>${INR(c.margin)}</td><td>${(c.margin/(c.revenue||1)*100).toFixed(0)}%</td><td>${c.revAtRisk>0?'<b style=color:var(--rej)>'+INR(c.revAtRisk)+'</b>':'—'}</td></tr>`).join('')}
    <tr style="border-top:2px solid var(--line)"><td class="cat">Total</td><td><b>${INRcr(S.totRev)}</b></td><td><b>${INRcr(S.totMar)}</b></td><td><b>${(S.totMar/S.totRev*100).toFixed(0)}%</b></td><td><b style="color:var(--rej)">${INRcr(S.totRisk)}</b></td></tr>
    </tbody></table></div>`:''}`;
}
function renderWarRoom(){
  const A=agents();
  document.getElementById('p-warroom').innerHTML=`
    <h2 class="serif">War Room — the boardroom of agents</h2><div class="sub">Five expert agents each read the current plan and propose a gated action. They converge on one recommendation — which you can apply as validated intents.</div>
    <div class="card"><h3>The debate</h3>${A.out.map(a=>`<div class="agent"><div class="nm">${a[0]} ${a[1]}</div><div class="ob">${a[2]}</div>${a[3]?`<div class="pr">Proposes: ${a[3]}</div>`:''}</div>`).join('')}</div>
    <div class="card" style="border-left:4px solid var(--vio)"><h3>🧠 Convergence</h3><div style="font-size:14px;color:var(--ink2)">${A.rec}</div>
      ${A.acts.length?`<div class="ex"><button class="toggle" onclick="applyAgents()">✓ Apply the recommendation (${A.acts.length} action${A.acts.length>1?'s':''})</button></div>`:''}</div>`;
}
function renderScenarios(S,m){
  document.getElementById('p-scenarios').innerHTML=`
    <h2 class="serif">Scenarios — save &amp; compare</h2><div class="sub">Snapshot the current plan (data + all what-ifs), then diff two side by side.</div>
    <div class="card"><h3>Snapshots <button class="toggle" onclick="saveScenario()">＋ Save current plan</button></h3>
    ${scenarios.length?`<table><thead><tr><th>Name</th><th>OTIF</th><th>${m?'Revenue':'Binding'}</th><th>${m?'At risk':'Shortfalls'}</th><th></th></tr></thead><tbody>
      ${scenarios.map((s,i)=>`<tr><td class="cat">${s.name}</td><td>${pctFill(s.otif)}</td><td>${m?INRcr(s.rev):(s.binding||'—')}</td><td>${m?INRcr(s.risk):s.shorts}</td><td><button class="toggle" style="padding:4px 9px" onclick="loadScenario(${i})">load</button></td></tr>`).join('')}
    </tbody></table>${scenarios.length>=2?`<div style="margin-top:12px;font-size:13px">Diff <b>${scenarios[scenarios.length-2].name}</b> → <b>${scenarios[scenarios.length-1].name}</b>: OTIF ${( (scenarios[scenarios.length-1].otif-scenarios[scenarios.length-2].otif)*100).toFixed(1)}pp${m?`, revenue ${INRcr(scenarios[scenarios.length-1].rev-scenarios[scenarios.length-2].rev)}`:''}.</div>`:''}`:'<div style="color:var(--mut);font-size:13.5px">No snapshots yet. Change some levers, then Save current plan.</div>'}</div>`;
}
function renderCopilot(){
  document.getElementById('p-copilot').innerHTML=`
    <h2 class="serif">AI Copilot</h2><div class="sub">Plain-English what-ifs → validated intents the engine re-solves. Works with no API key; invalid instructions change nothing.</div>
    <div class="chat"><div class="chatlog" id="chatlog">${chatlog||'<div class="bub a">Try a command, or ask me to run risk / optimise / convene the war room. I only propose what the deterministic engine can validate.</div>'}</div>
      <form class="chatin" onsubmit="ask(event)"><input id="cmd" placeholder="e.g. increase Carbonated demand 20%, then run risk"><button>Run</button></form></div>
    <div class="ex">
      <button onclick="quick('increase Carbonated demand 20%')">+20% Carbonated demand</button>
      <button onclick="quick('reduce Snacks capacity 30%')">−30% Snacks capacity</button>
      <button onclick="quick('run a risk simulation')">run risk</button>
      <button onclick="quick('optimise for margin')">optimise for margin</button>
      <button onclick="quick('convene the war room')">convene the war room</button>
      <button onclick="quick('reset')">reset</button></div>
    <div style="font-size:12px;color:var(--mut);margin-top:11px">Active intents: <b>${intents.length}</b>${intents.length?' · <a href="#" onclick="resetAll();return false">clear</a>':''}</div>`;
}

// ===================== ACTIONS =====================
function pushIntent(it){intents.push(it);redoStack=[];resolve();}
function editDemand(cat,i,v){demandOverride[cat]=demandOverride[cat]||{};demandOverride[cat][i]=Math.max(0,Math.round(+v||0));redoStack=[];resolve();}
function resetAll(){intents=[];redoStack=[];demandOverride={};priority=50;promoOn={};chatlog='';resolve();}
function undo(){if(intents.length){redoStack.push(['i',intents.pop()]);}else if(Object.keys(demandOverride).length){redoStack.push(['d',clone(demandOverride)]);demandOverride={};}resolve();}
function redo(){const r=redoStack.pop();if(!r)return;if(r[0]==='i')intents.push(r[1]);else demandOverride=r[1];resolve();}
function togglePromo(id){promoOn[id]=!promoOn[id];resolve();}
function adoptForecast(){(MASTER.categories||[]).forEach(c=>{const ov=demandOverride[c.name]||{};const vals=c.demand.map((d,i)=>ov[i]!=null?+ov[i]:d);const f=forecastCat(vals,vals.length);demandOverride[c.name]={};f.fc.forEach((x,i)=>demandOverride[c.name][i]=x.p50);});banner('📈 Adopted the trend forecast as the working plan. Re-solved.');resolve();}
function runOptimize(obj){const o=optimize(MASTER,obj);const before=solve(MASTER);o.alloc&&Object.entries(o.alloc).forEach(([c,v])=>{if(v>0)intents.push({t:'capacity',cat:c,pct:Math.round(v/((MASTER.categories.find(x=>x.name===c)||{}).capacity_per_month||1)*100)});});redoStack=[];const after=solve(MASTER);
  const el=document.getElementById('optOut'); if(el) el.innerHTML=`Allocated <b>${fmt(o.spent)}</b> extra cases of capacity to maximise <b>${obj}</b>. OTIF ${pctFill(before.otif)} → <b>${pctFill(after.otif)}</b>${money()?`; margin ${INRcr(before.totMar)} → <b>${INRcr(after.totMar)}</b>`:''}. Applied as intents (undo to revert).`;resolve();}
function applyAgents(){const A=agents();A.acts.forEach(a=>intents.push(a));redoStack=[];banner('✓ Applied the war-room recommendation as intents.');resolve();}
function saveScenario(){const S=solve(MASTER);const nm='Scenario '+(scenarios.length+1);scenarios.push({name:nm,otif:S.otif,rev:S.totRev,risk:S.totRisk,binding:S.binding?S.binding.name:'—',shorts:S.cats.filter(c=>c.totShort>0).length,snap:{intents:clone(intents),demandOverride:clone(demandOverride),priority,promoOn:clone(promoOn)}});banner('💾 Saved '+nm+'.');resolve();}
function loadScenario(i){const s=scenarios[i];if(!s)return;intents=clone(s.snap.intents);demandOverride=clone(s.snap.demandOverride);priority=s.snap.priority;promoOn=clone(s.snap.promoOn);redoStack=[];banner('↩ Loaded '+s.name+'.');resolve();}

// ===================== COPILOT PARSER =====================
let chatlog='';
function quick(t){document.getElementById('cmd').value=t;ask({preventDefault(){}});}
function pushChat(u,a){chatlog+=`<div class="bub u">${esc(u)}</div><div class="bub a">${a}</div>`;const l=document.getElementById('chatlog');if(l){l.innerHTML=chatlog;l.scrollTop=l.scrollHeight;}}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function catMatch(t){t=(t||'').toLowerCase();var best=null;(MASTER.categories||[]).forEach(function(c){if(t.includes(c.name.toLowerCase()))best=c.name;});if(best)return best;(MASTER.categories||[]).forEach(function(c){var toks=c.name.toLowerCase().replace(/[^a-z0-9]+/g,' ').split(' ').filter(function(w){return w.length>3;});if(toks.some(function(w){return t.includes(w);}))best=best||c.name;});return best;}
function narr(){const S=solve(MASTER);let s=`OTIF <b>${pctFill(S.otif)}</b> (target ${S.target}%); binding <b>${S.binding?S.binding.name:'—'}</b>`;if(money())s+=`; at risk <b>${INRcr(S.totRisk)}</b>`;const sh=S.cats.filter(c=>c.totShort>0).map(c=>c.name);s+=sh.length?`; shortfalls: ${sh.join(', ')}.`:'; no shortfalls.';return s;}
function ask(e){e.preventDefault();const t=(document.getElementById('cmd').value||'').trim();if(!t)return;const low=t.toLowerCase();let a,m2;
  if(/\breset|clear\b/.test(low)){resetAll();pushChat(t,'<b>Reset.</b> All what-ifs cleared.');document.getElementById('cmd').value='';return;}
  else if(/run.*(risk|simulation|monte)/.test(low)){const mc=montecarlo(MASTER,800);a=`<b>Monte-Carlo (800 runs):</b> OTIF P10 <b>${pctFill(mc.p10)}</b> · P50 ${pctFill(mc.p50)} · P90 ${pctFill(mc.p90)}; P(meet ${mc.target}%) <b>${(mc.pMeet*100).toFixed(0)}%</b>${money()?`; revenue-at-risk P90 ${INRL(mc.riskP90)}`:''}. See the Risk tab.`;setTab('risk');}
  else if(/optimi[sz]e|better plan|best plan/.test(low)){const obj=/margin/.test(low)?'margin':/risk/.test(low)?'risk':'otif';const before=solve(MASTER);runOptimize(obj);const after=solve(MASTER);a=`<b>Optimiser (${obj}):</b> OTIF ${pctFill(before.otif)} → <b>${pctFill(after.otif)}</b>. Allocated the capex budget to the highest-return categories. ${narr()}`;}
  else if(/war room|boardroom|convene|agents/.test(low)){const A=agents();setTab('warroom');a=`<b>War room convened.</b> ${A.rec} <a href="#" onclick="setTab('warroom');return false">Open the debate →</a>`;}
  else if(/forecast/.test(low)){setTab('demand');a=`<b>Forecast ready.</b> Trend projection for each category is on the Demand tab — "Adopt forecast" to load it as the plan.`;}
  else if((m2=low.match(/otif.*?(\d{2,3})/))){MASTER.params.otif_target=Math.min(100,+m2[1]);a=`<b>OTIF target → ${MASTER.params.otif_target}%.</b> ${narr()}`;resolve();}
  else if((m2=low.match(/(increase|raise|bump|decrease|reduce|cut|drop)\s+(.*?)\s+demand\s+(?:by\s+)?(\d+)/))){const cat=catMatch(m2[2])||catMatch(low);const pct=(/decrease|reduce|cut|drop/.test(m2[1])?-1:1)*+m2[3];if(!cat){a='Which category? '+(MASTER.categories||[]).map(c=>c.name).join(', ')+'.';}else{pushIntent({t:'demand',cat,pct});a=`<b>${cat} demand ${pct>0?'+':''}${pct}%.</b> ${narr()}`;}}
  else if((m2=low.match(/(reduce|cut|drop|increase|add|raise)\s+(.*?)\s+capacity\s+(?:by\s+)?(\d+)/))){const cat=catMatch(m2[2])||catMatch(low);const pct=(/reduce|cut|drop/.test(m2[1])?-1:1)*+m2[3];if(!cat){a='Which category\'s capacity?';}else{pushIntent({t:'capacity',cat,pct});a=`<b>${cat} capacity ${pct>0?'+':''}${pct}%.</b> ${narr()}`;}}
  else if(/offline/.test(low)){const cat=catMatch(low);if(cat){pushIntent({t:'capacity',cat,pct:-100});a=`<b>${cat} offline.</b> ${narr()}`;}else a='Name the category.';}
  else if((m2=low.match(/(?:add|new).*?order\s+(?:of\s+)?([\d,]+)\s*(?:cases|units)?\s*(?:for|of)?\s*(.*)/))){const qty=+m2[1].replace(/,/g,'');const cat=catMatch(m2[2])||catMatch(low);if(!cat||!qty){a='Try: "add order 5000 Snacks".';}else{pushIntent({t:'order',cat,qty});a=`<b>+${fmt(qty)}-case order on ${cat}.</b> ${narr()}`;}}
  else if(/save.*(scenario|plan|snapshot)/.test(low)){saveScenario();a='<b>Saved</b> the current plan as a scenario. See the Scenarios tab.';}
  else {a=`I can: change demand/capacity/orders/OTIF, "run risk", "optimise for margin", "convene the war room", "forecast", "save scenario", "reset". Example: "increase Beverages demand 20%".`;pushChat(t,a);document.getElementById('cmd').value='';return;}
  pushChat(t,a);render();document.getElementById('cmd').value='';
}

// ===================== WORKBOOK I/O =====================
function loadWorkbook(ev){const f=ev.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=e=>{try{let cats=[],months=[],promos=[];
    if(f.name.endsWith('.csv')){const rows=e.target.result.split(/\r?\n/).filter(x=>x.trim()).map(r=>r.split(','));const head=rows[0].map(h=>h.trim());
      months=head.slice(1).filter(h=>!/price|cost|capacity|inventory|stock/i.test(h));
      rows.slice(1).forEach(r=>{const o={name:r[0].trim(),demand:[],price:10,unit_cost:6,capacity_per_month:0,inventory_cases:0,elasticity:1,sigma:0.2,zone_share:{}};head.forEach((h,i)=>{if(i===0)return;const v=r[i];if(/price/i.test(h))o.price=+v;else if(/cost/i.test(h))o.unit_cost=+v;else if(/capacity/i.test(h))o.capacity_per_month=+v;else if(/inventory|stock/i.test(h))o.inventory_cases=+v;else if(/elastic/i.test(h))o.elasticity=+v;else o.demand.push(+v||0);});ZONES.forEach(z=>o.zone_share[z]=1/ZONES.length);if(o.name)cats.push(o);});
    }else{const wb=XLSX.read(e.target.result,{type:'binary'});const shN=wb.SheetNames.find(n=>/categor|demand|plan/i.test(n))||wb.SheetNames[0];const js=XLSX.utils.sheet_to_json(wb.Sheets[shN],{defval:0});const keys=Object.keys(js[0]||{});months=keys.filter(k=>!/name|categor|price|cost|capacity|inventory|stock|plant|elastic|sigma/i.test(k));
      js.forEach(r=>{const nk=keys.find(k=>/name|categor/i.test(k))||keys[0];const o={name:String(r[nk]).trim(),demand:months.map(mo=>+r[mo]||0),price:+(r[keys.find(k=>/price/i.test(k))]||10),unit_cost:+(r[keys.find(k=>/cost/i.test(k))]||6),capacity_per_month:+(r[keys.find(k=>/capacity/i.test(k))]||0),inventory_cases:+(r[keys.find(k=>/inventory|stock/i.test(k))]||0),elasticity:+(r[keys.find(k=>/elastic/i.test(k))]||1),sigma:0.2,zone_share:{}};ZONES.forEach(z=>o.zone_share[z]=1/ZONES.length);if(o.name&&o.name!=='0')cats.push(o);});}
    if(!cats.length)throw new Error('no category rows found');
    MASTER={categories:cats,months:months.length?months:cats[0].demand.map((_,i)=>'M'+(i+1)),params:{...(DEFAULT.params||{})},promos:promos.length?promos:[],zones:ZONES,zone_pos:DEFAULT.zone_pos,capex_budget_pct:DEFAULT.capex_budget_pct||15};
    SRC=f.name;resetAll();banner(`Loaded <b>${f.name}</b> — ${cats.length} categories, ${MASTER.months.length} months. Re-solved.`);
  }catch(err){banner('⚠ Could not read that workbook ('+err.message+'). Keeping current plan.',true);}};
  f.name.endsWith('.csv')?rd.readAsText(f):rd.readAsBinaryString(f);}
function banner(html,warn){const b=document.getElementById('banner');b.innerHTML=html;b.style.display='block';b.style.background=warn?'var(--rejbg)':'var(--okbg)';b.style.color=warn?'#881337':'#14532d';setTimeout(()=>{b.style.display='none'},5500);}
function downloadTemplate(){const head=['Category',...(MASTER.months||['M1','M2','M3','M4','M5','M6']),'Price','Cost','Capacity','Inventory','Elasticity'];const rows=[head.join(',')];(MASTER.categories||[]).forEach(c=>rows.push([c.name,...c.demand,c.price,c.unit_cost,c.capacity_per_month,c.inventory_cases,c.elasticity||1].join(',')));const blob=new Blob([rows.join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='fmcg-cockpit-template.csv';a.click();}

renderTabs();render();
</script>
